<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" font-family="'Inter', 'Helvetica Neue', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#444" stroke-width="1.2" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" fill="none" stroke="#aaa" stroke-width="1.1" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- bg -->
  <rect width="880" height="440" fill="#FDFCFA" rx="6"/>

  <!-- ════════════ MAIN HORIZONTAL FLOW ════════════ -->

  <!-- 1. YOU -->
  <rect x="32" y="155" width="108" height="54" rx="27" fill="none" stroke="#555" stroke-width="1.6"/>
  <text x="86" y="179" text-anchor="middle" font-size="15" font-weight="600" fill="#333">you</text>
  <text x="86" y="196" text-anchor="middle" font-size="9" fill="#888" font-style="italic">"make it look like..."</text>

  <!-- arrow 1→2 -->
  <line x1="143" y1="182" x2="189" y2="182" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- 2. CLAUDE CODE -->
  <rect x="195" y="148" width="138" height="68" rx="8" fill="#3B3F4A" stroke="none"/>
  <text x="264" y="176" text-anchor="middle" font-size="14" font-weight="600" fill="#E8E6E1">Claude Code</text>
  <text x="264" y="196" text-anchor="middle" font-size="9" fill="#9A978F">the agent</text>

  <!-- arrow 2→3 -->
  <line x1="337" y1="182" x2="395" y2="182" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="366" y="174" text-anchor="middle" font-size="8" fill="#999">MCP</text>

  <!-- 3. BLENDERMCP -->
  <rect x="401" y="152" width="130" height="58" rx="8" fill="none" stroke="#C17A3A" stroke-width="1.5"/>
  <text x="466" y="178" text-anchor="middle" font-size="13" font-weight="500" fill="#A06228">BlenderMCP</text>
  <text x="466" y="194" text-anchor="middle" font-size="8.5" fill="#C09060">socket :9876</text>

  <!-- arrow 3→4 -->
  <line x1="535" y1="182" x2="583" y2="182" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- 4. BLENDER -->
  <rect x="589" y="145" width="148" height="72" rx="8" fill="#1E1E1E" stroke="none"/>
  <text x="663" y="172" text-anchor="middle" font-size="14" font-weight="600" fill="#E9A33C">Blender</text>
  <text x="663" y="191" text-anchor="middle" font-size="9.5" fill="#BBB">Molecular Nodes</text>
  <text x="663" y="205" text-anchor="middle" font-size="8" fill="#777">Cycles  ·  bpy</text>

  <!-- arrow 4→5 -->
  <line x1="741" y1="182" x2="787" y2="182" stroke="#444" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- 5. OUTPUT -->
  <rect x="793" y="158" width="62" height="47" rx="6" fill="none" stroke="#555" stroke-width="1.4"/>
  <text x="824" y="178" text-anchor="middle" font-size="11" font-weight="500" fill="#444">.png</text>
  <text x="824" y="193" text-anchor="middle" font-size="11" font-weight="500" fill="#444">.mp4</text>

  <!-- ════════════ REPO KNOWLEDGE (above, feeding into agent) ════════════ -->

  <rect x="140" y="28" width="310" height="88" rx="7" fill="#F4F1EB" stroke="#B8B0A0" stroke-width="1.2" stroke-dasharray="7,4"/>

  <!-- label -->
  <text x="155" y="48" font-size="10" font-weight="600" fill="#7A7060" letter-spacing="0.8">BLENDER-AGENT REPO</text>

  <!-- three items inside, spaced naturally -->
  <text x="165" y="72" font-size="12" font-weight="600" fill="#4A4540">CLAUDE.md</text>
  <text x="165" y="86" font-size="8.5" fill="#8A8070">workflow, rules, routing</text>

  <text x="295" y="72" font-size="12" font-weight="600" fill="#4A4540">knowledge/</text>
  <text x="295" y="86" font-size="8.5" fill="#8A8070">MN api, bpy pitfalls</text>

  <text x="165" y="106" font-size="12" font-weight="600" fill="#4A4540">templates/</text>
  <text x="295" y="106" font-size="12" font-weight="600" fill="#4A4540">scripts/</text>

  <!-- arrow: repo → agent -->
  <line x1="264" y1="118" x2="264" y2="144" stroke="#B8B0A0" stroke-width="1.3" marker-end="url(#arr-muted)"/>
  <text x="280" y="136" font-size="8" fill="#A09880" font-style="italic">reads at startup</text>

  <!-- ════════════ LOCAL PYTHON (below-left, from agent) ════════════ -->

  <rect x="155" y="262" width="166" height="66" rx="7" fill="#F6F3F9" stroke="#9B85B5" stroke-width="1.2"/>
  <text x="238" y="284" text-anchor="middle" font-size="12" font-weight="500" fill="#5E4B75">Local Python</text>
  <text x="238" y="300" text-anchor="middle" font-size="9" fill="#8A75A0">RDKit  ·  MDAnalysis  ·  ffmpeg</text>
  <text x="238" y="316" text-anchor="middle" font-size="8.5" fill="#A08CB5">SMILES → .pdb    DCD → .pdb</text>

  <!-- arrow: agent down to local -->
  <line x1="240" y1="216" x2="238" y2="258" stroke="#9B85B5" stroke-width="1.3" marker-end="url(#arr-muted)"/>
  <text x="220" y="240" font-size="8" fill="#9B85B5">Bash</text>

  <!-- arrow: local .pdb curves up to blender -->
  <path d="M 321 292 Q 450 292 520 250 Q 570 228 600 218"
        stroke="#9B85B5" stroke-width="1.1" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-muted)"/>
  <text x="445" y="280" font-size="7.5" fill="#A08CB5" font-style="italic">.pdb loaded via MCP</text>

  <!-- ════════════ FEEDBACK LOOP (below-right, from blender back to agent) ════════════ -->

  <path d="M 663 220 Q 663 260 620 280 Q 540 310 460 330 Q 380 350 300 340 Q 250 335 264 300"
        stroke="#3B3F4A" stroke-width="1.1" stroke-dasharray="5,4" fill="none" marker-end="url(#arr-muted)"/>

  <!-- annotation on the feedback loop -->
  <rect x="410" y="340" width="178" height="28" rx="4" fill="#FDFCFA" stroke="none"/>
  <text x="416" y="354" font-size="9" fill="#666">screenshot → check → adjust</text>
  <text x="416" y="366" font-size="8" fill="#999" font-style="italic">the agentic feedback loop</text>

  <!-- ════════════ TOOL CALL ANNOTATION ════════════ -->

  <text x="406" y="140" font-size="7.5" fill="#C09060" font-family="'SF Mono', 'Fira Code', monospace">execute_blender_code()</text>
  <text x="406" y="151" font-size="7.5" fill="#C09060" font-family="'SF Mono', 'Fira Code', monospace">get_viewport_screenshot()</text>

</svg>
